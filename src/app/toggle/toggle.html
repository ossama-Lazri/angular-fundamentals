<div class="p-4 bg-white rounded-2xl shadow-md w-64 text-center">
  <h3 class="text-lg font-semibold mb-3">Toggle</h3>

  <button (click)="toggle()"
    class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">
    Toggle
  </button>

  @if (isVisible) {
    <p class="mt-3 text-green-600 font-medium">Visible content</p>
  }
</div>
