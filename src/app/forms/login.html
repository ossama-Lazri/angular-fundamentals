<div class="p-4 bg-white rounded-lg shadow-md">
  <h3 class="text-lg font-medium mb-3 text-gray-900">Login (Template-driven)</h3>

  <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)" novalidate class="space-y-3">
    <div>
      <label class="block text-sm text-gray-700 mb-1">Email</label>
      <input name="email" [(ngModel)]="email" required email class="w-full border rounded-md p-2 text-sm" />
      <div *ngIf="loginForm.submitted || submitted">
        <div *ngIf="loginForm.controls['email']?.invalid" class="text-xs text-red-600 mt-1">Enter a valid email.</div>
      </div>
    </div>

    <div>
      <label class="block text-sm text-gray-700 mb-1">Password</label>
      <input name="password" [(ngModel)]="password" required minlength="6" type="password" class="w-full border rounded-md p-2 text-sm" />
      <div *ngIf="loginForm.submitted || submitted">
        <div *ngIf="loginForm.controls['password']?.invalid" class="text-xs text-red-600 mt-1">Password is required (min 6).</div>
      </div>
    </div>

    <div class="flex items-center gap-2">
      <button type="submit" class="px-3 py-1 bg-blue-600 text-white rounded-md text-sm hover:bg-blue-700 transition">Login</button>
      <button type="button" (click)="loginForm.resetForm()" class="px-3 py-1 border rounded-md text-sm">Reset</button>
    </div>

    <div *ngIf="error" class="text-sm text-red-600">{{ error }}</div>
  </form>
</div>
