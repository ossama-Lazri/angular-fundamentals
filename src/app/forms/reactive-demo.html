<div class="p-4 bg-white rounded-lg shadow-md">
  <h3 class="text-lg font-medium mb-3 text-gray-900">Reactive Forms — Mini demo</h3>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-3" novalidate>
    <div>
      <label class="block text-sm text-gray-700 mb-1">Email</label>
      <input formControlName="email" class="w-full border rounded-md p-2 text-sm" />
      <div *ngIf="form.controls['email']?.touched && form.controls['email']?.invalid" class="text-xs text-red-600 mt-1">
        <div *ngIf="form.controls['email']?.errors?.['required']">Email is required.</div>
        <div *ngIf="form.controls['email']?.errors?.['email']">Enter a valid email.</div>
      </div>
    </div>

    <div>
      <label class="block text-sm text-gray-700 mb-1">Password</label>
      <input formControlName="password" type="password" class="w-full border rounded-md p-2 text-sm" />
      <div *ngIf="form.controls['password']?.touched && form.controls['password']?.invalid" class="text-xs text-red-600 mt-1">
        <div *ngIf="form.controls['password']?.errors?.['required']">Password is required.</div>
        <div *ngIf="form.controls['password']?.errors?.['minlength']">Min 6 characters required.</div>
      </div>
    </div>

    <div class="flex items-center gap-2">
      <input type="checkbox" formControlName="remember" />
      <label class="text-sm text-gray-700">Remember me</label>
    </div>

    <div class="flex items-center gap-2">
      <button class="px-3 py-1 bg-indigo-600 text-white rounded-md text-sm hover:bg-indigo-700 transition" [disabled]="form.invalid">Submit</button>
    </div>
  </form>
</div>
