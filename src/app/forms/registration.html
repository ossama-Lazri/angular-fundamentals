<div class="p-4 bg-white rounded-lg shadow-md">
  <h3 class="text-lg font-medium mb-3 text-gray-900">Registration (Template-driven)</h3>

  <form #regForm="ngForm" (ngSubmit)="onSubmit(regForm)" novalidate class="space-y-3">

    <div>
      <label class="block text-sm text-gray-700 mb-1">Full name</label>
      <input name="name" [(ngModel)]="model.name" required minlength="2" class="w-full border rounded-md p-2 text-sm" />
      <div *ngIf="regForm.submitted || submitted">
        <div *ngIf="regForm.controls['name']?.invalid" class="text-xs text-red-600 mt-1">
          Name is required (min 2 chars).
        </div>
      </div>
    </div>

    <div>
      <label class="block text-sm text-gray-700 mb-1">Email</label>
      <input name="email" [(ngModel)]="model.email" required email class="w-full border rounded-md p-2 text-sm" />
      <div *ngIf="regForm.submitted || submitted">
        <div *ngIf="regForm.controls['email']?.invalid" class="text-xs text-red-600 mt-1">
          Please enter a valid email address.
        </div>
      </div>
    </div>

    <div>
      <label class="block text-sm text-gray-700 mb-1">Password</label>
      <input name="password" [(ngModel)]="model.password" required minlength="6" type="password" class="w-full border rounded-md p-2 text-sm" />
      <div *ngIf="regForm.submitted || submitted">
        <div *ngIf="regForm.controls['password']?.invalid" class="text-xs text-red-600 mt-1">
          Password is required (min 6 characters).
        </div>
      </div>
    </div>

    <div class="flex items-center gap-2">
      <input type="checkbox" name="acceptTerms" [(ngModel)]="model.acceptTerms" required />
      <label class="text-sm text-gray-700">I accept the terms</label>
    </div>
    <div *ngIf="regForm.submitted || submitted">
      <div *ngIf="regForm.controls['acceptTerms']?.invalid" class="text-xs text-red-600">
        You must accept the terms.
      </div>
    </div>

    <div class="flex items-center gap-2">
      <button type="submit" class="px-3 py-1 bg-green-600 text-white rounded-md text-sm hover:bg-green-700 transition" [disabled]="regForm.invalid">Register</button>
      <div class="text-sm text-gray-500">or try the login form next</div>
    </div>

    <div *ngIf="successMessage" class="text-sm text-green-700 mt-2">{{ successMessage }}</div>
  </form>
</div>
