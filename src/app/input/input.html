<div class="p-4 bg-white rounded-2xl shadow-md w-64 text-center">
  <h3 class="text-lg font-semibold mb-3">Input</h3>

  <input
    [(ngModel)]="name"
    placeholder="Your name"
    class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
  />

  <p class="mt-3 text-gray-700">Hello <span class="font-semibold">{{ name }}</span></p>
</div>
