<div class="p-4 bg-white rounded-2xl shadow-md w-72 text-center">
  <h3 class="text-lg font-semibold mb-3">Calculator</h3>

  <div class="flex gap-2 mb-3">
    <input [(ngModel)]="a" type="number"
      class="w-1/2 px-2 py-1 border rounded-lg">

    <input [(ngModel)]="b" type="number"
      class="w-1/2 px-2 py-1 border rounded-lg">
  </div>

  <button (click)="add()"
    class="w-full py-2 bg-purple-500 text-white rounded-lg hover:bg-purple-600">
    Add
  </button>

  <p class="mt-3 text-xl font-bold text-gray-800">
    Result: {{ result }}
  </p>
</div>
