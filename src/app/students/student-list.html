<div class="bg-white rounded-lg shadow-sm p-3">
  <h4 class="text-sm font-medium text-gray-800 mb-2">Students ({{ students.length }})</h4>

  <div *ngIf="students.length === 0" class="text-sm text-gray-500">No students found.</div>

  <ul *ngIf="students.length > 0" class="space-y-2">
    <li *ngFor="let s of students; trackBy: trackById" class="flex items-center justify-between p-2 rounded-md hover:bg-gray-50 transition">
      <div class="flex items-center gap-3">
        <div [ngClass]="{ 'bg-green-100 text-green-800': s.active, 'bg-gray-100 text-gray-700': !s.active }" class="px-2 py-1 rounded-full text-xs font-semibold">{{ s.active ? 'Active' : 'Inactive' }}</div>
        <div>
          <div class="font-medium text-sm text-gray-900">{{ s.name }}</div>
          <div class="text-xs text-gray-500">{{ s.major }} · {{ s.age }} yrs</div>
        </div>
      </div>

      <div class="flex items-center gap-2">
        <button (click)="edit.emit(s)" class="text-sm px-2 py-1 border rounded-md text-blue-600 hover:bg-blue-50">Edit</button>
        <button (click)="remove.emit(s.id)" class="text-sm px-2 py-1 border rounded-md text-red-600 hover:bg-red-50">Delete</button>
      </div>
    </li>
  </ul>
</div>
